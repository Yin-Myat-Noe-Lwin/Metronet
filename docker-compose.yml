version: '3.9'

services:
  backend:
    image: scarletwitch22801/metronet-backend:latest
    container_name: backend
    env_file:
      - ./backend/.env
    ports:
      - "8080:8000"
    working_dir: /app
    command: php artisan serve --host=0.0.0.0
    volumes:
    - ./backend:/app
    depends_on:
      - db
      - redis
      - kafka
    networks:
      - metronet
    restart: unless-stopped

  supervisor:
    image: scarletwitch22801/metronet-backend:latest
    container_name: supervisor
    working_dir: /app
    command: supervisord -c /etc/supervisor.conf
    restart: always
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - metronet
    volumes:
      - ./backend:/app
      - ./backend/docker/supervisord.conf:/etc/supervisor/supervisord.conf:ro
      - ./backend/storage/logs:/var/log/supervisor
      - ./backend/storage/logs:/app/storage/logs
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=your_app_key_here
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=localMetronet
      - DB_USERNAME=leona
      - DB_PASSWORD=123456
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BROKERS=kafka:9092

  db:
    image: mysql:8
    container_name: db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=localMetronet
      - MYSQL_USER=leona
      - MYSQL_PASSWORD=123456
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - metronet

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: "a1b2c3d4e5f6g7h8"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    entrypoint: >
      /bin/sh -c "
      /etc/kafka/docker/run &

      echo 'Waiting for Kafka..........';
      until /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1; do
        sleep 2;
      done;

      echo 'Creating topics..........';
      for topic in payment.success subscription.cancelled plan.update plan.deactivated subscription.auto.cancelled payment.reminder  service.activated invoice.created; do
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --create --if-not-exists --topic $$topic --partitions 1 --replication-factor 1;
      done;

      echo 'All topics created successfully';
      wait
      "
    networks:
      metronet:
        aliases:
          - kafka-broker
          - kafka

  kafka-ui:
    container_name: kafka-ui
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - metronet
    depends_on:
      - kafka

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - metronet

  frontend:
    image: scarletwitch22801/metronet-frontend:latest
    container_name: frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - metronet
    depends_on:
      - db
      - backend
      - kafka
      - redis

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./backend:/app/backend
      - ./frontend/dist:/app/frontend/dist
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - metronet
    depends_on:
      - backend
      - frontend

volumes:
  mysql_data:

networks:
  metronet:
    driver: bridge
