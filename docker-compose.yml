version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "8080:8000"
    volumes:
      - ./backend:/app
    working_dir: /app
    command: php artisan serve --host=0.0.0.0 --port=8000
    depends_on:
      - db
      - redis
      - kafka
    networks:
      - metronet

  db:
    image: mysql:8
    container_name: db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=localMetronet
      - MYSQL_USER=leona
      - MYSQL_PASSWORD=123456
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - metronet

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: "a1b2c3d4e5f6g7h8"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    networks:
      - metronet

  scheduler:
    build:
      context: ./backend
    container_name: scheduler
    working_dir: /app
    volumes:
      - ./backend:/app
    command: php artisan schedule:work
    depends_on:
      - db
      - redis
    networks:
      - metronet

  worker:
    build:
      context: ./backend
    container_name: worker
    working_dir: /app
    volumes:
      - ./backend:/app
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    depends_on:
      - db
      - redis
      - kafka
    networks:
      - metronet

  billing-consumer:
    build:
      context: ./backend
    container_name: billing-consumer
    working_dir: /app
    volumes:
      - ./backend:/app
    command: php artisan kafka:billing-consume
    depends_on:
      - kafka
      - db
      - redis
    networks:
      - metronet

  payment-consumer:
    build:
      context: ./backend
    container_name: payment-consumer
    working_dir: /app
    volumes:
      - ./backend:/app
    command: php artisan kafka:payment-consume
    depends_on:
      - kafka
      - db
      - redis
    networks:
      - metronet

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - metronet

volumes:
  mysql_data:

networks:
  metronet:
    driver: bridge
