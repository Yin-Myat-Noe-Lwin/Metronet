[supervisorctl]
serverurl=unix:///var/run/supervisord.sock

[unix_http_server]
file=/var/run/supervisord.sock
chmod=0700

[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
logfile_maxbytes=50MB
logfile_backups=10
loglevel=info
pidfile=/var/run/supervisord.pid

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:queue-worker]
command=php /app/artisan queue:work --sleep=1 --tries=3
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/queue.log
stdout_logfile_maxbytes=10MB
stderr_logfile=/var/log/supervisor/queue-error.log
stderr_logfile_maxbytes=10MB
redirect_stderr=false
stopwaitsecs=3600

[program:kafka-consumer]
command=php /app/artisan kafka:billing-consume
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/kafka.log
stdout_logfile_maxbytes=10MB
stderr_logfile=/var/log/supervisor/kafka-error.log
stderr_logfile_maxbytes=10MB
redirect_stderr=false
stopwaitsecs=3600

